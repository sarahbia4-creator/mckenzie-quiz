<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get to Know McKenzie</title>
<style>
  @font-face {
    font-family: 'Laluxes';
    src: url('https://static.showit.co/file/yNFO1PGBbZbnsr4_PqUqyA/152945/laluxes.woff') format('opentype');
  }

  @font-face {
    font-family: 'Gordita';
    src: url('https://static.showit.co/file/Es72PWAIY1rb6wnV3TlNTw/152945/0825e48b888e2966c14f17034b133d07.woff') format('woff');
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #082131;
    --burgundy: #662837;
    --burgundy-dark: #50233a;
    --cream: #f9f1e8;
    --cream-dark: #f0e6d6;
    --text-light: #d7dfe5;
    --text-muted: #a8b4bc;
    --gold: #c1a55f;
  }

  html, body {
    width: 100%;
    background: var(--navy);
    color: var(--cream);
    font-family: 'Gordita', sans-serif;
    font-weight: 400;
    -webkit-font-smoothing: antialiased;
  }

  .quiz-wrap {
    max-width: 884px;
    margin: 0 auto;
    padding: 3rem 1.5rem 4rem;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .brand-label {
    font-family: 'Gordita', sans-serif;
    font-weight: 400;
    font-size: 13px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1rem;
  }

  .quiz-title {
    font-family: 'Laluxes', serif;
    font-size: clamp(2.2rem, 6vw, 3.5rem);
    font-weight: 400;
    font-style: normal;
    text-transform: uppercase;
    line-height: 1.1;
    text-align: center;
    color: var(--cream);
    margin-bottom: 0.5rem;
    letter-spacing: -0.01em;
  }

  .quiz-subtitle {
    font-family: 'Gordita', sans-serif;
    font-size: 15px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-align: center;
    margin-bottom: 3rem;
  }

  .progress-bar {
    width: 100%;
    max-width: 624px;
    height: 1px;
    background: rgba(255,255,255,0.1);
    margin-bottom: 2.5rem;
    position: relative;
  }

  .progress-fill {
    height: 100%;
    background: var(--gold);
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    width: 0%;
  }

  .progress-label {
    position: absolute;
    right: 0;
    top: 8px;
    font-size: 13px;
    font-family: 'Gordita', sans-serif;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }

  .card {
    width: 100%;
    max-width: 676px;
    background: rgba(255,255,255,0.04);
    border: 0.5px solid rgba(255,255,255,0.1);
    border-radius: 2px;
    padding: 2.5rem;
    position: relative;
    transition: opacity 0.3s ease, transform 0.3s ease;
  }

  .card.fade-out {
    opacity: 0;
    transform: translateY(-8px);
    pointer-events: none;
  }

  .card.fade-in {
    animation: fadeUp 0.4s ease forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-number {
    font-family: 'Gordita', sans-serif;
    font-size: 13px;
    letter-spacing: 0.25em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 1.2rem;
  }

  .q-text {
    font-family: 'Gordita', sans-serif;
    font-size: clamp(1.25rem, 4vw, 1.7rem);
    font-weight: 400;
    font-style: normal;
    text-transform: uppercase;
    line-height: 1.3;
    color: var(--cream);
    margin-bottom: 2rem;
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 18px;
    border: 0.5px solid rgba(255,255,255,0.12);
    border-radius: 1px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    background: transparent;
    color: var(--cream);
    font-family: 'Gordita', sans-serif;
    font-size: 16px;
    font-weight: 400;
    letter-spacing: 0.02em;
    line-height: 1.5;
    text-align: left;
    width: 100%;
  }

  .option:hover {
    background: rgba(255,255,255,0.05);
    border-color: rgba(193,165,95,0.4);
  }

  .option.selected {
    background: rgba(102,40,55,0.25);
    border-color: var(--burgundy);
  }

  .option.correct {
    background: rgba(193,165,95,0.12);
    border-color: var(--gold);
  }

  .option.wrong {
    background: rgba(102,40,55,0.15);
    border-color: rgba(102,40,55,0.5);
    opacity: 0.6;
  }

  .opt-letter {
    font-size: 13px;
    letter-spacing: 0.15em;
    color: var(--gold);
    font-weight: 400;
    min-width: 14px;
    padding-top: 1px;
    flex-shrink: 0;
  }

  .opt-icon {
    margin-left: auto;
    font-size: 16px;
    flex-shrink: 0;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .option.correct .opt-icon,
  .option.wrong .opt-icon { opacity: 1; }

  .answer-reveal {
    margin-top: 1.5rem;
    padding: 1.2rem 1.5rem;
    border-left: 2px solid var(--gold);
    background: rgba(193,165,95,0.06);
    display: none;
    animation: fadeUp 0.3s ease forwards;
  }

  .answer-reveal.show { display: block; }

  .reveal-label {
    font-family: 'Gordita', sans-serif;
    font-size: 13px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 6px;
  }

  .reveal-text {
    font-family: 'Gordita', sans-serif;
    font-size: 1rem;
    line-height: 1.6;
    color: var(--text-light);
    font-style: normal;
  }

  .next-btn {
    margin-top: 2rem;
    width: 100%;
    padding: 14px 24px;
    background: var(--burgundy);
    color: var(--cream);
    border: none;
    font-family: 'Gordita', sans-serif;
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
    display: none;
    border-radius: 1px;
  }

  .next-btn:hover { background: var(--burgundy-dark); }
  .next-btn.visible { display: block; }

  .results-card {
    width: 100%;
    max-width: 676px;
    text-align: center;
    display: none;
    animation: fadeUp 0.5s ease forwards;
  }

  .results-card.show { display: block; }

  .result-badge {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: rgba(193,165,95,0.1);
    border: 1px solid var(--gold);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.5rem;
    font-family: 'Laluxes', serif;
    font-size: 1.8rem;
    font-style: normal;
    color: var(--gold);
  }

  .result-score {
    font-family: 'Laluxes', serif;
    font-size: clamp(2rem, 6vw, 3rem);
    font-weight: 400;
    font-style: normal;
    text-transform: uppercase;
    color: var(--cream);
    margin-bottom: 0.3rem;
  }

  .result-title {
    font-family: 'Gordita', sans-serif;
    font-size: 13px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 1.5rem;
  }

  .result-msg {
    font-family: 'Gordita', sans-serif;
    font-size: 1.05rem;
    font-style: normal;
    color: var(--text-light);
    line-height: 1.7;
    margin-bottom: 2.5rem;
    padding: 0 1rem;
  }

  .result-facts {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 2.5rem;
    text-align: left;
  }

  .fact-chip {
    padding: 12px 14px;
    border: 0.5px solid rgba(255,255,255,0.1);
    border-radius: 1px;
    background: rgba(255,255,255,0.03);
  }

  .fact-chip-label {
    font-family: 'Gordita', sans-serif;
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 4px;
  }

  .fact-chip-val {
    font-family: 'Gordita', sans-serif;
    font-size: 1rem;
    color: var(--cream);
  }

  .cta-btn {
    display: inline-block;
    padding: 15px 36px;
    background: var(--burgundy);
    color: var(--cream);
    font-family: 'Gordita', sans-serif;
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    text-decoration: none;
    border-radius: 1px;
    transition: background 0.2s;
    border: none;
    cursor: pointer;
    margin-bottom: 1rem;
    width: 100%;
  }

  .cta-btn:hover { background: var(--burgundy-dark); }

  .restart-btn {
    display: block;
    width: 100%;
    padding: 12px;
    background: transparent;
    border: 0.5px solid rgba(255,255,255,0.15);
    color: var(--text-muted);
    font-family: 'Gordita', sans-serif;
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 1px;
    transition: border-color 0.2s, color 0.2s;
  }

  .restart-btn:hover {
    border-color: rgba(255,255,255,0.3);
    color: var(--cream);
  }

  .divider {
    width: 40px;
    height: 1px;
    background: var(--gold);
    margin: 2.5rem auto;
    opacity: 0.5;
  }

  @media (max-width: 480px) {
    .quiz-wrap { padding: 2rem 1rem 3rem; }
    .card { padding: 1.75rem 1.25rem; }
    .result-facts { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="quiz-wrap">

  <p class="brand-label">McKenzie Brayley Photography</p>
  <h1 class="quiz-title">Get to know me</h1>
  <p class="quiz-subtitle">How well do you know your photographer?</p>

  <div class="progress-bar" id="progressBar">
    <div class="progress-fill" id="progressFill"></div>
    <span class="progress-label" id="progressLabel">0 / 8</span>
  </div>

  <div class="card fade-in" id="quizCard">
    <p class="q-number" id="qNumber">Question 01</p>
    <p class="q-text" id="qText"></p>
    <div class="options" id="optionsWrap"></div>
    <div class="answer-reveal" id="answerReveal">
      <p class="reveal-label">From McKenzie</p>
      <p class="reveal-text" id="revealText"></p>
    </div>
    <button class="next-btn" id="nextBtn">Continue &rarr;</button>
  </div>

  <div class="results-card" id="resultsCard">
    <div class="result-badge" id="resultBadge">MB</div>
    <p class="result-score" id="resultScore"></p>
    <p class="result-title">You got right</p>
    <p class="result-msg" id="resultMsg"></p>
    <div class="result-facts">
      <div class="fact-chip">
        <p class="fact-chip-label">Based in</p>
        <p class="fact-chip-val">Calgary, Alberta</p>
      </div>
      <div class="fact-chip">
        <p class="fact-chip-label">Dog mum to</p>
        <p class="fact-chip-val">5 dogs</p>
      </div>
      <div class="fact-chip">
        <p class="fact-chip-label">Favourite food</p>
        <p class="fact-chip-val">Chicken nuggets</p>
      </div>
      <div class="fact-chip">
        <p class="fact-chip-label">Travel ready</p>
        <p class="fact-chip-val">Rockies & beyond</p>
      </div>
    </div>
    <a href="https://www.mckenziebrayley.com/contact-us" class="cta-btn">Work with McKenzie &rarr;</a>
    <button class="restart-btn" id="restartBtn">Retake the quiz</button>
  </div>

</div>

<script>
const questions = [
  {
    q: "How many dogs does McKenzie have?",
    opts: ["Two", "Three", "Five", "Seven"],
    correct: 2,
    reveal: "Five chaotic, beloved dogs — and honestly they probably show up in her stories more than she'd like to admit."
  },
  {
    q: "What is McKenzie's ultimate comfort food?",
    opts: ["Sushi", "Pasta", "Chicken nuggets", "Tacos"],
    correct: 2,
    reveal: "Chicken nuggets, every time. No notes. She's a connoisseur and she owns it."
  },
  {
    q: "What kind of movie does McKenzie have a soft spot for?",
    opts: ["Psychological thrillers", "Cheesy Hallmark Christmas films", "Action blockbusters", "Foreign art house cinema"],
    correct: 1,
    reveal: "Predictable endings, festive settings, and a love story you saw coming from the opening scene — she's fully here for it."
  },
  {
    q: "Where is McKenzie based?",
    opts: ["Edmonton, Alberta", "Vancouver, BC", "Calgary, Alberta", "Banff, Alberta"],
    correct: 2,
    reveal: "Calgary born and based, but always ready to pack her bag for the Rockies, Alberta, and wherever love takes her."
  },
  {
    q: "How would you describe McKenzie's vibe on a wedding day?",
    opts: ["Strict and schedule-driven", "Easy-going with a healthy dose of sarcasm", "Formal and professional", "Quiet and invisible"],
    correct: 1,
    reveal: "She takes her job seriously — but she's not going to make you feel like you're in a photoshoot. If you have a good sense of humour, you'll get along just fine."
  },
  {
    q: "What does McKenzie love most about photographing couples?",
    opts: ["Perfectly posed portraits", "Capturing real connection and in-between moments", "Golden hour technical shots", "Aerial and wide venue shots"],
    correct: 1,
    reveal: "The inside jokes, the improv moments, the genuine emotion — that's where she lives. The poses are just the warm-up."
  },
  {
    q: "Which publications has McKenzie been featured in?",
    opts: ["Vogue & Brides", "Confetti Magazine & Calgary Guardian", "Martha Stewart Weddings", "The Knot & Junebug"],
    correct: 1,
    reveal: "Confetti Magazine, Calgary Guardian, and Canadian Wedding Photographers. She's making waves in all the right places."
  },
  {
    q: "What's McKenzie's most important promise to her couples?",
    opts: ["She delivers in 2 weeks guaranteed", "She's fully present and in your corner every step of the way", "She'll reshoot anything you don't love", "She only books 10 weddings a year"],
    correct: 1,
    reveal: "Fully, genuinely there — every step of the way. That's the whole thing. More than style or skill, it's the relationship that matters most to her."
  }
];

let current = 0;
let score = 0;
let answered = false;

const qNumber = document.getElementById('qNumber');
const qText = document.getElementById('qText');
const optionsWrap = document.getElementById('optionsWrap');
const answerReveal = document.getElementById('answerReveal');
const revealText = document.getElementById('revealText');
const nextBtn = document.getElementById('nextBtn');
const progressFill = document.getElementById('progressFill');
const progressLabel = document.getElementById('progressLabel');
const quizCard = document.getElementById('quizCard');
const resultsCard = document.getElementById('resultsCard');
const resultScore = document.getElementById('resultScore');
const resultMsg = document.getElementById('resultMsg');

function pad(n) { return n < 10 ? '0' + n : n; }

function loadQuestion() {
  answered = false;
  answerReveal.classList.remove('show');
  nextBtn.classList.remove('visible');

  const q = questions[current];
  qNumber.textContent = 'Question ' + pad(current + 1);
  qText.textContent = q.q;
  revealText.textContent = q.reveal;

  optionsWrap.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span><span>${opt}</span><span class="opt-icon" id="icon-${i}"></span>`;
    btn.addEventListener('click', () => selectAnswer(i, btn));
    optionsWrap.appendChild(btn);
  });

  const pct = (current / questions.length) * 100;
  progressFill.style.width = pct + '%';
  progressLabel.textContent = current + ' / ' + questions.length;
}

function selectAnswer(chosen, btn) {
  if (answered) return;
  answered = true;

  const correct = questions[current].correct;
  const allOpts = optionsWrap.querySelectorAll('.option');

  allOpts.forEach((o, i) => {
    const icon = o.querySelector('.opt-icon');
    if (i === correct) {
      o.classList.add('correct');
      icon.textContent = '✓';
    } else if (i === chosen && chosen !== correct) {
      o.classList.add('wrong');
      icon.textContent = '×';
    } else {
      o.classList.add('wrong');
    }
  });

  if (chosen === correct) score++;

  answerReveal.classList.add('show');
  nextBtn.classList.add('visible');
  nextBtn.textContent = current < questions.length - 1 ? 'Continue →' : 'See my results →';
}

nextBtn.addEventListener('click', () => {
  current++;
  if (current >= questions.length) {
    showResults();
  } else {
    quizCard.classList.add('fade-out');
    setTimeout(() => {
      loadQuestion();
      quizCard.classList.remove('fade-out');
      quizCard.classList.add('fade-in');
      setTimeout(() => quizCard.classList.remove('fade-in'), 400);
    }, 300);
  }
});

function showResults() {
  quizCard.style.display = 'none';
  resultsCard.classList.add('show');

  progressFill.style.width = '100%';
  progressLabel.textContent = questions.length + ' / ' + questions.length;

  const pct = Math.round((score / questions.length) * 100);
  resultScore.textContent = score + ' / ' + questions.length;

  const msgs = [
    { max: 2, text: "You're just getting to know her — and that's the best part. McKenzie's the kind of photographer whose personality is half the magic. Time to dive deeper." },
    { max: 5, text: "You know the highlights! McKenzie is exactly as she appears — warm, funny, and completely real. The rest you'll discover on your wedding day." },
    { max: 7, text: "You're practically a McKenzie superfan at this point. She would absolutely get along with you — and probably drag you along for chicken nuggets after the reception." },
    { max: 8, text: "Okay, are you sure you haven't just read her whole website? You know McKenzie better than most. She'd be genuinely impressed — and a little suspicious." }
  ];

  const msg = msgs.find(m => score <= m.max) || msgs[msgs.length - 1];
  resultMsg.textContent = msg.text;
}

document.getElementById('restartBtn').addEventListener('click', () => {
  current = 0;
  score = 0;
  resultsCard.classList.remove('show');
  quizCard.style.display = 'block';
  quizCard.classList.add('fade-in');
  loadQuestion();
  setTimeout(() => quizCard.classList.remove('fade-in'), 400);
  progressFill.style.width = '0%';
  progressLabel.textContent = '0 / ' + questions.length;
});

loadQuestion();

function notifyHeight() {
  const h = document.documentElement.scrollHeight;
  window.parent.postMessage({ type: 'quizHeight', height: h }, '*');
  try { window.top.postMessage({ type: 'quizHeight', height: h }, '*'); } catch(e) {}
}
const ro = new ResizeObserver(() => { setTimeout(notifyHeight, 50); });
ro.observe(document.documentElement);
window.addEventListener('load', notifyHeight);
notifyHeight();
setInterval(notifyHeight, 300);
</script>
</body>
</html>
